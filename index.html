<!DOCTYPE html>
<html>
<head>
  <title>Kolkata Voting</title>

  <!-- MOBILE FIX -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      background: black;
      color: white;
    }

    .container {
      position: relative;
      width: 100%;
      max-width: 1000px;
      margin: auto;
    }

    .bg {
      width: 100%;
      display: block;
    }

    /* RESPONSIVE COUNTER */
    #counter {
      position: absolute;
      top: 28%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 10vw;
      color: yellow;
      text-shadow: 2px 2px 10px black;
    }

    /* RESPONSIVE BUTTON */
    #btn {
      position: absolute;
      top: 60%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 3vw 6vw;
      font-size: 5vw;
      border: none;
      border-radius: 10px;
      background: #ff4757;
      color: white;
      cursor: pointer;
    }

    #btn:disabled {
      background: gray;
      cursor: not-allowed;
    }

    #message {
      font-size: 22px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<div id="message">Checking location...</div>

<div class="container" id="mainContent" style="display:none;">
  <img src="cover.png" class="bg">

  <div id="counter">0</div>
  <button id="btn">Vote</button>
</div>

<script>
const counter = document.getElementById("counter");
const btn = document.getElementById("btn");
const message = document.getElementById("message");
const mainContent = document.getElementById("mainContent");

// UNIQUE GLOBAL COUNTER (KOLKATA ONLY USERS WILL ACCESS IT)
const namespace = "F&I 4 School Captain";
const key = "votes";

// 📍 LOCATION CHECK
fetch("https://ipapi.co/json/")
  .then(res => res.json())
  .then(location => {

    if (
  location.region !== "West Bengal" ||
  location.country_name !== "India"
) {
  document.body.innerHTML = "<h1>Sorry! Only Kolkata region users allowed.</h1>";
  return;
}
 

    // ✅ Allow access
    message.innerText = "Welcome SCIS voter!";
    mainContent.style.display = "block";

    // 🔢 LOAD GLOBAL COUNTER
    fetch(`https://api.countapi.xyz/get/${namespace}/${key}`)
      .then(res => res.json())
      .then(data => {
        counter.innerText = data.value;
      });

    // 🚫 PREVENT MULTIPLE VOTES (basic)
    let voted = localStorage.getItem("voted");

    if (voted) {
      btn.disabled = true;
      btn.innerText = "Already Voted";
    }

    // 🗳️ VOTE ACTION
    btn.onclick = () => {
      if (voted) return;

      fetch(`https://api.countapi.xyz/hit/${namespace}/${key}`)
        .then(res => res.json())
        .then(data => {
          counter.innerText = data.value;
        });

      localStorage.setItem("voted", "true");
      btn.disabled = true;
      btn.innerText = "Already Voted";
    };

  })
  .catch(() => {
    document.body.innerHTML = "<h1>Error detecting location. Try again later.</h1>";
  });
</script>

</body>
</html>
