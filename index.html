<!DOCTYPE html>
<html>
<head>
  <title>Campaign</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .container {
      position: relative;
      width: 100%;
      max-width: 1000px;
      margin: auto;
    }

    .bg {
      width: 100%;
      display: block;
    }

    /* COUNTER */
    #counter {
      position: absolute;
      top: 280px;   /* 🔧 adjust */
      left: 50%;
      transform: translateX(-50%);
      font-size: 70px;
      font-weight: bold;
      color: yellow;
      text-shadow: 2px 2px 10px black;
    }

    /* BUTTON */
    #btn {
      position: absolute;
      top: 450px;   /* 🔧 adjust */
      left: 50%;
      transform: translateX(-50%);
      padding: 15px 40px;
      font-size: 22px;
      border: none;
      border-radius: 10px;
      background: #ff4757;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    #btn:hover {
      background: #ff6b81;
      transform: translateX(-50%) scale(1.05);
    }

    #btn:disabled {
      background: gray;
      cursor: not-allowed;
    }
  </style>
</head>

<body>

  <div class="container">
    <img src="cover.png" class="bg">

    <div id="counter">0</div>
    <button id="btn">Vote</button>
  </div>

  <script>
    let count = localStorage.getItem("count") || 0;
    let voted = localStorage.getItem("voted");

    const counter = document.getElementById("counter");
    const btn = document.getElementById("btn");

    counter.innerText = count;

    if (voted) {
      btn.disabled = true;
      btn.innerText = "Already Voted";
    }

    btn.onclick = () => {
      if (voted) return;

      count++;
      localStorage.setItem("count", count);
      localStorage.setItem("voted", "true");

      counter.innerText = count;

      btn.disabled = true;
      btn.innerText = "Already Voted";
    };
  </script>

</body>
</html>
