<!DOCTYPE html>
<html>
<head>
  <title>SCIS School Captain Voting</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      background: black;
      color: white;
    }

    .container {
      position: relative;
      width: 100%;
      max-width: 1000px;
      margin: auto;
    }

    .bg {
      width: 100%;
      display: block;
    }

    /* COUNTER */
    #counter {
      position: absolute;
      top: 30%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: clamp(30px, 6vw, 60px);
      color: yellow;
      text-shadow: 2px 2px 10px black;
    }

    /* BUTTON */
    #btn {
      position: absolute;
      top: 60%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: clamp(8px, 2vw, 20px) clamp(15px, 4vw, 40px);
      font-size: clamp(14px, 3vw, 22px);
      border: none;
      border-radius: 10px;
      background: #ff4757;
      color: white;
      cursor: pointer;
    }

    #btn:disabled {
      background: gray;
      cursor: not-allowed;
    }

    /* MESSAGE */
    #message {
      font-size: clamp(18px, 4vw, 28px);
      font-weight: bold;
      margin: 15px;
      color: #00ffcc;
    }

    /* TIMER */
    #timer {
      font-size: clamp(16px, 3vw, 24px);
      margin-bottom: 10px;
      color: #ffffff;
    }
  </style>
</head>

<body>

<div id="message">Checking eligibility...</div>
<div id="timer"></div>

<div class="container" id="mainContent" style="display:none;">
  <img src="cover.png" class="bg">

  <div id="counter">0</div>
  <button id="btn">Vote for School Captain</button>
</div>

<script>
const counter = document.getElementById("counter");
const btn = document.getElementById("btn");
const message = document.getElementById("message");
const mainContent = document.getElementById("mainContent");
const timerEl = document.getElementById("timer");

// 🕒 DEADLINE (4 May 2026, 11:59 PM IST)
const deadline = new Date("May 4, 2026 23:59:00 GMT+0530").getTime();

// TIMER FUNCTION
function updateTimer() {
  const now = new Date().getTime();
  const diff = deadline - now;

  if (diff <= 0) {
    document.body.innerHTML = "<h1>The day of voting has come! You can't access this website anymore.</h1>";
    return;
  }

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
  const minutes = Math.floor((diff / (1000 * 60)) % 60);

  timerEl.innerText = `Voting ends in: ${days}d ${hours}h ${minutes}m`;
}

setInterval(updateTimer, 1000);
updateTimer();

// 🌍 LOCATION CHECK
fetch("https://ipapi.co/json/")
  .then(res => res.json())
  .then(location => {

    if (
      location.region !== "West Bengal" ||
      location.country_name !== "India"
    ) {
      document.body.innerHTML = "<h1>Sorry! Only Kolkata region users can participate.</h1>";
      return;
    }

    // ✅ Allow
    message.innerText = "SCIS School Captain Voting - Kolkata Voter";

    mainContent.style.display = "block";

    // 🌐 GLOBAL COUNTER
    const namespace = "scis-captain-2026";
    const key = "votes";

    fetch(`https://api.countapi.xyz/get/${namespace}/${key}`)
      .then(res => res.json())
      .then(data => {
        counter.innerText = data.value;
      });

    // 🚫 ONE VOTE
    let voted = localStorage.getItem("voted");

    if (voted) {
      btn.disabled = true;
      btn.innerText = "Already Voted";
    }

    btn.onclick = () => {
      if (voted) return;

      fetch(`https://api.countapi.xyz/hit/${namespace}/${key}`)
        .then(res => res.json())
        .then(data => {
          counter.innerText = data.value;
        });

      localStorage.setItem("voted", "true");
      btn.disabled = true;
      btn.innerText = "Vote Submitted";
    };

  })
  .catch(() => {
    document.body.innerHTML = "<h1>Location detection failed. Please open via website.</h1>";
  });
</script>

</body>
</html>
