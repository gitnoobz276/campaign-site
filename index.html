<!DOCTYPE html>
<html>
<head>
  <title>Campaign</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      text-align: center;
      background: black;
      color: white;
    }

    .container {
      position: relative;
      max-width: 1000px;
      margin: auto;
    }

    .bg {
      width: 100%;
      display: block;
    }

    #counter {
      position: absolute;
      top: 280px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 70px;
      color: yellow;
    }

    #btn {
      position: absolute;
      top: 450px;
      left: 50%;
      transform: translateX(-50%);
      padding: 15px 40px;
      font-size: 22px;
      cursor: pointer;
    }

    #timer {
      font-size: 25px;
      margin: 20px;
    }
  </style>
</head>

<body>

<div id="message"></div>
<div id="timer"></div>

<div class="container" id="mainContent" style="display:none;">
  <img src="cover.png" class="bg">
  <div id="counter">0</div>
  <button id="btn">Vote</button>
</div>

<script>
const counter = document.getElementById("counter");
const btn = document.getElementById("btn");
const message = document.getElementById("message");
const mainContent = document.getElementById("mainContent");
const timerEl = document.getElementById("timer");

// 🔥 DEADLINE (IST)
const deadline = new Date("May 4, 2026 00:00:00 GMT+0530").getTime();

// TIMER
function updateTimer() {
  const now = new Date().getTime();
  const diff = deadline - now;

  if (diff <= 0) {
    document.body.innerHTML = "<h1>The day of voting has come! You can't access this website anymore.</h1>";
    return;
  }

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
  const minutes = Math.floor((diff / (1000 * 60)) % 60);

  timerEl.innerText = `Time left: ${days}d ${hours}h ${minutes}m`;
}

setInterval(updateTimer, 1000);
updateTimer();

// 🌍 LOCATION CHECK (using free API)
fetch("https://ipapi.co/json/")
  .then(res => res.json())
  .then(data => {

    const city = data.city;
    const region = data.region;
    const country = data.country_name;

    if (city !== "Kolkata") {
      document.body.innerHTML = "<h1>Sorry! Your country/state is not eligible for this participation.</h1>";
      return;
    }

    // ✅ Allow access
    mainContent.style.display = "block";

    // LOCAL COUNTER (Kolkata users only)
    let count = localStorage.getItem("kolkataVotes") || 0;
    let voted = localStorage.getItem("voted");

    counter.innerText = count;

    if (voted) {
      btn.disabled = true;
      btn.innerText = "Already Voted";
    }

    btn.onclick = () => {
      if (voted) return;

      count++;
      localStorage.setItem("kolkataVotes", count);
      localStorage.setItem("voted", "true");

      counter.innerText = count;

      btn.disabled = true;
      btn.innerText = "Already Voted";
    };

  })
  .catch(() => {
    document.body.innerHTML = "<h1>Error detecting location. Please try again.</h1>";
  });
</script>

</body>
</html>
