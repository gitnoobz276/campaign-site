<!DOCTYPE html>
<html>
<head>
  <title>Campaign</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      background: black;
      color: white;
    }

    .container {
      position: relative;
      width: 100%;
      max-width: 1000px;
      margin: auto;
    }

    .bg {
      width: 100%;
      display: block;
      opacity: 0.9;
    }

    /* COUNTER */
    #counter {
      position: absolute;
      top: 250px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 70px;
      color: yellow;
      text-shadow: 2px 2px 10px black;
    }

    /* TIMER */
    #timer {
      position: absolute;
      top: 330px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 30px;
      color: cyan;
      text-shadow: 1px 1px 5px black;
    }

    /* BUTTON */
    #btn {
      position: absolute;
      top: 420px;
      left: 50%;
      transform: translateX(-50%);
      padding: 15px 40px;
      font-size: 22px;
      border-radius: 10px;
      border: none;
      background: #ff4757;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    #btn:hover {
      background: #ff6b81;
      transform: translateX(-50%) scale(1.05);
    }

    #btn:disabled {
      background: gray;
      cursor: not-allowed;
    }

    /* MESSAGE */
    #message {
      position: absolute;
      top: 500px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 22px;
      color: white;
    }
  </style>
</head>

<body>

<div class="container">
  <img src="cover.png" class="bg">

  <div id="counter">0</div>
  <div id="timer"></div>
  <button id="btn">Vote</button>
  <div id="message"></div>
</div>

<script>
const counter = document.getElementById("counter");
const btn = document.getElementById("btn");
const message = document.getElementById("message");
const timer = document.getElementById("timer");

// ✅ LOCAL COUNTER (you can replace later with global)
let count = parseInt(localStorage.getItem("count")) || 0;
let voted = localStorage.getItem("voted");

counter.innerText = count;

// 🌍 LOCATION CHECK (Kolkata / West Bengal)
fetch("https://ipapi.co/json/")
  .then(res => res.json())
  .then(data => {
    if (data.region !== "West Bengal") {
      btn.style.display = "none";
      counter.style.display = "none";
      timer.style.display = "none";
      message.innerText = "Sorry! Your state/country isn't eligible for this participation.";
    }
  });

// 🕒 COUNTDOWN (Kolkata time)
const target = new Date("2026-05-04T00:00:00+05:30").getTime();

function updateTimer() {
  const now = new Date().getTime();
  const diff = target - now;

  if (diff <= 0) {
    // ⛔ TIME ENDED
    btn.style.display = "none";
    timer.style.display = "none";
    message.innerText = "Thanks for your vote!";
    return;
  }

  let days = Math.floor(diff / (1000 * 60 * 60 * 24));
  let hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
  let minutes = Math.floor((diff / (1000 * 60)) % 60);
  let seconds = Math.floor((diff / 1000) % 60);

  timer.innerText = `${days}d ${hours}h ${minutes}m ${seconds}s`;
}

setInterval(updateTimer, 1000);
updateTimer();

// 🗳️ VOTING
if (voted) {
  btn.disabled = true;
  btn.innerText = "Already Voted";
}

btn.onclick = () => {
  if (voted) return;

  count++;
  localStorage.setItem("count", count);
  localStorage.setItem("voted", "true");

  counter.innerText = count;

  btn.disabled = true;
  btn.innerText = "Voted!";
};

</script>

</body>
</html>
