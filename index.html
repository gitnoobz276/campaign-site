<!DOCTYPE html>
<html>
<head>
  <title>Kolkata Voting</title>

  <!-- MOBILE FIX -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      background: black;
      color: white;
    }

    .container {
      position: relative;
      width: 100%;
      max-width: 1000px;
      margin: auto;
    }

    .bg {
      width: 100%;
      display: block;
    }

    #counter {
  position: absolute;
  top: 28%;
  left: 50%;
  transform: translate(-50%, -50%);
  
  font-size: clamp(30px, 6vw, 60px); /* 🔥 fixes size */
  color: yellow;
  text-shadow: 2px 2px 10px black;
}

#btn {
  position: absolute;
  top: 60%;
  left: 50%;
  transform: translate(-50%, -50%);
  
  padding: clamp(8px, 2vw, 20px) clamp(15px, 4vw, 40px);
  font-size: clamp(14px, 3vw, 22px);
  
  border: none;
  border-radius: 10px;
  background: #ff4757;
  color: white;
  cursor: pointer;
}

    #btn:disabled {
      background: gray;
      cursor: not-allowed;
    }

#message {
  font-size: clamp(18px, 4vw, 28px);
  font-weight: bold;
  margin-top: 20px;
  
  color: #00ffcc;
  text-shadow: 0 0 15px #00ffcc;
}
  </style>
</head>

<body>

<div id="message">Checking location...</div>

<div class="container" id="mainContent" style="display:none;">
  <img src="cover.png" class="bg">

  <div id="counter">0</div>
  <button id="btn">Vote</button>
</div>

<script>
const counter = document.getElementById("counter");
const btn = document.getElementById("btn");
const message = document.getElementById("message");
const mainContent = document.getElementById("mainContent");

// UNIQUE GLOBAL COUNTER (KOLKATA ONLY USERS WILL ACCESS IT)
const namespace = "kolkata-voting-2026";
const key = "votes";

// 📍 LOCATION CHECK
fetch("https://ipapi.co/json/")
  .then(res => res.json())
  .then(location => {

    if (location.city !== "Kolkata") {
      document.body.innerHTML = "<h1>Sorry! Your country/state is not eligible for this participation.</h1>";
      return;
    }

    // ✅ Allow access
    message.innerText = "Welcome Kolkata voter!";
    mainContent.style.display = "block";

    // 🔢 LOAD GLOBAL COUNTER
    fetch(`https://api.countapi.xyz/get/${namespace}/${key}`)
      .then(res => res.json())
      .then(data => {
        counter.innerText = data.value;
      });

    // 🚫 PREVENT MULTIPLE VOTES (basic)
    let voted = localStorage.getItem("voted");

    if (voted) {
      btn.disabled = true;
      btn.innerText = "Already Voted";
    }

    // 🗳️ VOTE ACTION
    btn.onclick = () => {
      if (voted) return;

      fetch(`https://api.countapi.xyz/hit/${namespace}/${key}`)
        .then(res => res.json())
        .then(data => {
          counter.innerText = data.value;
        });

      localStorage.setItem("voted", "true");
      btn.disabled = true;
      btn.innerText = "Already Voted";
    };

  })
  .catch(() => {
    document.body.innerHTML = "<h1>Error detecting location. Try again later.</h1>";
  });
</script>

</body>
</html>
